services:
  postgres:
    image: docker-io.gsmlg.dev/library/postgres:16-alpine
    environment:
      POSTGRES_USER: npm
      POSTGRES_PASSWORD: npm
      POSTGRES_DB: npm_registry
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: docker-io.gsmlg.dev/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3data:/data

  createbuckets:
    image: docker-io.gsmlg.dev/minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/npm-registry --ignore-existing;
      exit 0;
      "

volumes:
  pgdata:
  s3data:
